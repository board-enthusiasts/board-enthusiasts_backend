<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Board Enthusiasts authenticator was removed</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #060811; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #060811;">
      <tr>
        <td align="center" style="padding: 32px 16px;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 640px; border: 1px solid rgba(159, 178, 216, 0.18); border-radius: 28px; background: linear-gradient(180deg, rgba(16, 22, 38, 0.98), rgba(8, 12, 24, 0.98)); overflow: hidden;">
            <tr>
              <td style="padding: 36px;">
                <div style="color: #9fb2d8; font-size: 13px; letter-spacing: 0.24em; text-transform: uppercase;">Board Enthusiasts</div>
                <div style="padding-top: 18px; color: #f8fafc; font-size: 34px; line-height: 1.15; font-weight: 700;">An authenticator was removed</div>
                <p style="margin: 24px 0 0; color: #d5def0; font-size: 18px; line-height: 1.8;">
                  Multi-factor authentication was removed from your Board Enthusiasts account.
                </p>
                <p style="margin: 18px 0 0; color: #9fb2d8; font-size: 15px; line-height: 1.8;">
                  If this was not you, sign in and review your security settings right away.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
