# Local socket access is allowed for container-local administration.
local   all             all                                     trust

# Reject any plaintext TCP connection attempts.
hostnossl all           all             0.0.0.0/0               reject
hostnossl all           all             ::/0                    reject

# Require TLS for all TCP clients.
hostssl all             all             0.0.0.0/0               scram-sha-256
hostssl all             all             ::/0                    scram-sha-256
