services:
  postgres:
    build:
      context: ./postgres
    container_name: board_tpl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: board_tpl
      POSTGRES_USER: board_tpl_user
      POSTGRES_PASSWORD: board_tpl_password
    ports:
      - "5432:5432"
    volumes:
      - board_tpl_pg_data:/var/lib/postgresql/data
      - ./postgres/certs/server.crt:/certs/server.crt:ro
      - ./postgres/certs/server.key:/certs/server.key:ro
      - ./postgres/pg_hba_tls.conf:/etc/postgresql/pg_hba_tls.conf:ro

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: board_tpl_keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_KEY_STORE_FILE: /opt/keycloak/conf/boardtpl-localhost-devcert.pfx
      KC_HTTPS_KEY_STORE_PASSWORD: boardtpl-devcert
      QUARKUS_HTTP_HTTP2: "true"
    ports:
      - "8443:8443"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - ./keycloak/certs/boardtpl-localhost-devcert.pfx:/opt/keycloak/conf/boardtpl-localhost-devcert.pfx:ro

volumes:
  board_tpl_pg_data:
