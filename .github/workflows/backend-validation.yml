name: Backend Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standalone:
    name: Validate Backend Standalone
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout backend branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Materialize standalone shared-package shims
        run: |
          mkdir -p ../packages
          rsync -a ./.ci/root-workspace/packages/migration-contract/ ../packages/migration-contract/
          cp ./.ci/root-workspace/tsconfig.base.json ../tsconfig.base.json

      - name: Install backend dependencies
        working-directory: apps/workers-api
        run: npm install

      - name: Run backend tests
        working-directory: apps/workers-api
        run: npm test

      - name: Run backend typecheck
        working-directory: apps/workers-api
        run: npm run typecheck
